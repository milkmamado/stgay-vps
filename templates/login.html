<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>STGAY 입장</title>
    <style>
/* ===== STGAY Login - Vercel Style ===== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

body {
    background: #000000;
    color: #ededed;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.login-box {
    background: #0a0a0a;
    padding: 48px 40px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid #333;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    min-width: 340px;
}
h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 28px;
    letter-spacing: -0.4px;
    color: #ededed;
}
input {
    background: #000;
    border: 1px solid #333;
    color: #ededed;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    width: 100%;
    text-align: center;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s ease;
    outline: none;
    box-sizing: border-box;
}
input:focus {
    border-color: #ededed;
}
input::placeholder {
    color: #666;
}
button {
    background: #ededed;
    color: #000;
    border: none;
    padding: 10px 30px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 16px;
    display: block;
    width: 100%;
    font-family: 'Inter', sans-serif;
    transition: background 0.15s ease;
    letter-spacing: -0.2px;
}
button:hover {
    background: #ffffff;
}
.error {
    color: #ff4f4f;
    margin-top: 12px;
    font-size: 13px;
}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>📊 STGAY</h1>
        <form method="POST">
            <input type="password" name="password" placeholder="입장 번호" autofocus>
            <button type="submit">입장</button>
        </form>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </div>
</body>
</html>
