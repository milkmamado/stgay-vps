<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 STGAY - 주식 분석기</title>
    <style>
/* ===== STGAY Index - Vercel Style ===== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg: #000000;
    --surface: #0a0a0a;
    --border: #1a1a1a;
    --text: #ededed;
    --text-dim: #888888;
    --text-muted: #555555;
    --accent: #0070f3;
    --purple: #7928ca;
    --blue: #0070f3;
    --green: #00c853;
    --yellow: #f5a623;
    --red: #ee0000;
    --gold: #ededed;
    --silver: #888888;
    --bronze: #666666;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

/* ---- Navbar ---- */
.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.8);
    position: sticky;
    top: 0;
    z-index: 100;
}
.navbar-brand {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
}
.navbar-brand span {
    color: var(--green);
}
.navbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
}
.badge {
    display: none;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 9999px;
    letter-spacing: 0.2px;
}
.btn-small {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.15s ease;
}
.btn-small:hover {
    border-color: #444;
    color: var(--text);
    background: rgba(255,255,255,0.05);
}
.btn-logout:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(238,0,0,0.05);
}

/* ---- Start Button ---- */
.start-section { padding: 16px 20px; }
.btn-start {
    width: 100%;
    padding: 12px;
    background: #ededed;
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.3px;
}
.btn-start:hover { background: #ffffff; }
.btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

/* ---- Progress ---- */
.progress-section { display: none; padding: 0 20px 16px; }
.progress-bar-bg {
    background: var(--border);
    border-radius: 9999px;
    height: 4px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 9999px;
}
.progress-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
}

/* ---- Container ---- */
.container { max-width: 860px; margin: 0 auto; padding: 0 20px 40px; }

/* ---- Stats ---- */
.stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    margin: 20px 0;
    background: var(--border);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
}
.stat-card {
    background: var(--surface);
    border: none;
    border-radius: 0;
    padding: 20px;
    text-align: center;
}
.stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
}
.stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
}

/* ---- Sections ---- */
.section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 12px;
}
.section-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
}

/* ---- TOP3 Cards ---- */
.top3-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 12px;
    transition: border-color 0.15s ease;
}
.top3-card:hover { border-color: #333; }
.top3-card.rank-1 { border-left: 2px solid var(--text); }
.top3-card.rank-2 { border-left: 2px solid var(--text-dim); }
.top3-card.rank-3 { border-left: 2px solid var(--text-muted); }

.card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
}
.card-left { display: flex; align-items: center; gap: 12px; }
.rank-badge {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
}
.rank-badge.r1 { background: #ededed; color: #000; }
.rank-badge.r2 { background: #333; color: #ededed; }
.rank-badge.r3 { background: #1a1a1a; color: #888; border: 1px solid #333; }
.stock-name { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.stock-code {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 6px;
    font-family: 'JetBrains Mono', monospace;
}
.theme-tag {
    display: inline-block;
    background: rgba(0,112,243,0.1);
    color: var(--accent);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 9999px;
    margin-top: 4px;
    font-weight: 500;
}

/* ---- Confidence ---- */
.confidence { text-align: right; }
.conf-value {
    font-size: 20px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.5px;
}
.conf-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.conf-bar { width: 60px; height: 2px; background: #1a1a1a; border-radius: 9999px; margin-top: 4px; }
.conf-fill { height: 100%; border-radius: 9999px; }

/* ---- Summary ---- */
.summary-text {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
    border: 1px solid var(--border);
}

/* ---- Reasons ---- */
.reasons-title {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
}
.reason-item {
    font-size: 13px;
    color: var(--text-dim);
    padding: 4px 0 4px 16px;
    position: relative;
    line-height: 1.6;
}
.reason-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 12px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
}

/* ---- Plan Grid ---- */
.plan-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    margin: 16px 0;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
}
.plan-item {
    background: var(--surface);
    border-radius: 0;
    padding: 12px;
    text-align: center;
}
.plan-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    font-weight: 500;
}
.plan-value {
    font-size: 13px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.3px;
}

/* ---- Risks ---- */
.risk-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.risk-sev {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
}
.sev-high { background: rgba(238,0,0,0.15); color: #ff4f4f; }
.sev-medium { background: rgba(245,166,35,0.15); color: #f5a623; }
.sev-low { background: rgba(0,200,83,0.15); color: #00c853; }
.risk-text { font-size: 13px; color: var(--text-dim); }
.risk-miti { font-size: 12px; color: var(--accent); margin-top: 2px; }

/* ---- Catalysts ---- */
.catalyst-item {
    font-size: 13px;
    color: var(--text-dim);
    padding: 4px 0 4px 20px;
    position: relative;
}
.catalyst-item::before { content: '→'; position: absolute; left: 0; font-size: 12px; color: var(--accent); }

/* ---- Verdict ---- */
.verdict-box {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(0,112,243,0.05);
    border-left: 2px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
}

/* ---- Misc ---- */
.sub-title {
    font-size: 12px;
    font-weight: 600;
    margin: 16px 0 8px;
    color: var(--text-dim);
}

.extra-content {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.8;
    white-space: pre-wrap;
}

.theme-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
}
.theme-row:last-child { border-bottom: none; }
.theme-rank {
    color: var(--text-dim);
    font-weight: 600;
    min-width: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
}
.theme-name { flex: 1; color: var(--text); }
.theme-count { color: var(--text-muted); font-size: 12px; font-family: 'JetBrains Mono', monospace; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
.empty-state h2 { margin-bottom: 8px; color: var(--text); font-weight: 600; }

.error-box {
    background: rgba(238,0,0,0.05);
    border: 1px solid rgba(238,0,0,0.2);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    margin: 16px 0;
}

.chart-container {
    margin: 16px 0;
    background: var(--surface);
    border-radius: 6px;
    padding: 12px;
    border: 1px solid var(--border);
}
.chart-container canvas { width: 100%; height: 200px; }

.footer {
    text-align: center;
    padding: 32px 0;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.2px;
}

@media(max-width: 600px) {
    .plan-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-row { grid-template-columns: 1fr; }
    .card-header { flex-direction: column; align-items: flex-start; }
    .confidence { text-align: left; }
}
    
/* Calculator */

                .calc-range-btn { background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.4); color: var(--accent); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 8px; transition: all 0.2s; width: 100%; }
        .calc-range-btn:hover { background: rgba(59,130,246,0.35); }
        .calc-range-btn.applied { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.4); color: #22c55e; }
        .calc-range-info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 14px; color: var(--accent); text-align: center; }
        .calc-section { margin-top: 16px; padding: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; }
.calc-toggle { width: 100%; padding: 10px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; font-size: 14px; text-align: center; }
.calc-toggle:hover { border-color: var(--text-dim); }
.calc-body { display: none; margin-top: 12px; }
.calc-body.open { display: block; }
.calc-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.calc-row label { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; display: block; }
.calc-row input, .calc-row select { width: 100%; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 13px; }
.calc-row .field { flex: 1; min-width: 100px; }
        .field label { display: block; margin-bottom: 6px; }
.calc-btn { padding: 8px 16px; background: var(--text); color: var(--bg); border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 8px; }
.calc-result-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; }
.calc-result-table th, .calc-result-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: right; }
.calc-result-table th { color: var(--text-dim); font-weight: 500; }
.calc-summary { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
.calc-summary .sum-item { flex: 1; min-width: 120px; padding: 10px; background: var(--bg); border-radius: 6px; text-align: center; }
.calc-summary .sum-label { font-size: 11px; color: var(--text-dim); }
.calc-summary .sum-value { font-size: 16px; font-weight: 600; margin-top: 4px; }

<body>
    <div class="navbar">
        <div>
            <span class="navbar-brand">ST<span>GAY</span></span>
            <span id="statusBadge" class="badge"></span>
        </div>
        <div class="navbar-right">
            <button id="downloadBtn" class="btn-small" style="display:none" onclick="downloadHTML()">📥 HTML 저장</button>
            <button class="btn-small btn-logout" onclick="location.href='/stgay/logout'">로그아웃</button>
        </div>
    </div>

    <div class="start-section">
        <button id="startBtn" class="btn-start" onclick="startAnalysis()">🔍 분석 시작</button>

    <div id="progressSection" class="progress-section">
        <div class="progress-bar-bg"><div id="progressFill" class="progress-fill"></div></div>
        <div id="progressPhase" class="progress-label"></div>
    </div>

    <div id="resultArea" class="container"></div>

    <script>
    let pollTimer = null;
    let lastResultData = null;

    function esc(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = String(str);
        return d.innerHTML;
    }

    function startAnalysis() {
        const btn = document.getElementById('startBtn');
        btn.disabled = true;
        btn.textContent = '분석 진행 중...';
        document.getElementById('progressSection').style.display = 'block';
        document.getElementById('resultArea').innerHTML = '';
        document.getElementById('downloadBtn').style.display = 'none';

        const swing = true;
        const surge = false;
        const mode = 'swing';
        fetch('/stgay/api/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({mode: mode})
        })
            .then(r => r.json())
            .then(() => { pollTimer = setInterval(pollStatus, 1500); })
            .catch(e => {
                btn.disabled = false;
                btn.textContent = '🔍 분석 시작';
                alert('시작 실패: ' + e);
            });
    }

    function pollStatus() {
        fetch('/stgay/api/status').then(r => r.json()).then(data => {
            document.getElementById('progressPhase').textContent = data.phase || '';
            document.getElementById('progressFill').style.width = (data.percent || 0) + '%';

            const badge = document.getElementById('statusBadge');
            if (data.running) {
                badge.style.display = 'inline';
                badge.textContent = data.phase;
            }

            if (!data.running) {
                clearInterval(pollTimer);
                badge.style.display = 'none';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('startBtn').textContent = '🔍 스윙 분석 시작';
                document.getElementById('progressSection').style.display = 'none';

                if (data.has_result) {
                    fetch('/stgay/api/result').then(r => r.json()).then(renderDashboard);
                } else if (data.error) {
                    document.getElementById('resultArea').innerHTML =
                        '<div class="error-box"><h2>❌ 오류</h2><p style="margin-top:8px;color:var(--text-dim)">' + esc(data.error) + '</p></div>';
                }
            }
        });
    }

    // ===== 캔들스틱 차트 =====
    function drawCandleChart(canvasId, prices, entryPlan) {
        const canvas = document.getElementById(canvasId);
        if (!canvas || !prices || prices.length === 0) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        const W = rect.width - 20;
        const H = 200;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(dpr, dpr);

        const data = prices.slice(-40); // 최근 40일
        const highs = data.map(d => d.high);
        const lows = data.map(d => d.low);
        const maxP = Math.max(...highs);
        const minP = Math.min(...lows);
        const range = maxP - minP || 1;
        const pad = { top: 10, bottom: 25, left: 60, right: 10 };
        const cw = (W - pad.left - pad.right) / data.length;

        function y(price) { return pad.top + (1 - (price - minP) / range) * (H - pad.top - pad.bottom); }

        // Background grid
        ctx.strokeStyle = '#1e1e2e';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= 4; i++) {
            const py = pad.top + i * (H - pad.top - pad.bottom) / 4;
            ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(W - pad.right, py); ctx.stroke();
            const price = maxP - (i / 4) * range;
            ctx.fillStyle = '#666';
            ctx.font = '10px monospace';
            ctx.textAlign = 'right';
            ctx.fillText(price >= 10000 ? (price/10000).toFixed(1)+'만' : price.toLocaleString(), pad.left - 5, py + 3);
        }

        // Volume bars (subtle)
        const maxVol = Math.max(...data.map(d => d.volume || 0)) || 1;
        data.forEach((d, i) => {
            const vx = pad.left + i * cw + cw * 0.15;
            const vw = cw * 0.7;
            const vh = (d.volume / maxVol) * 30;
            ctx.fillStyle = d.close >= d.open ? 'rgba(0,184,148,0.15)' : 'rgba(225,112,85,0.15)';
            ctx.fillRect(vx, H - pad.bottom - vh, vw, vh);
        });

        // Candles
        data.forEach((d, i) => {
            const x = pad.left + i * cw;
            const mid = x + cw / 2;
            const isUp = d.close >= d.open;
            const color = isUp ? '#00b894' : '#e17055';

            // Wick
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(mid, y(d.high));
            ctx.lineTo(mid, y(d.low));
            ctx.stroke();

            // Body
            const bodyTop = y(Math.max(d.open, d.close));
            const bodyBot = y(Math.min(d.open, d.close));
            const bodyH = Math.max(bodyBot - bodyTop, 1);
            ctx.fillStyle = color;
            ctx.fillRect(x + cw * 0.15, bodyTop, cw * 0.7, bodyH);
        });


        // Price helper
        function parseKrPrice(s) {
            if (!s) return null;
            s = String(s).replace(/[^0-9~\-,.만원]/g, '').replace(/,/g, '');
            if (s.includes('만')) return parseFloat(s) * 10000;
            var v = parseFloat(s); return isNaN(v) ? null : v;
        }
        function parsePriceRange(s) {
            if (!s) return [null, null];
            s = String(s);
            if (s.includes('~')) { var p = s.split('~'); return [parseKrPrice(p[0]), parseKrPrice(p[1])]; }
            if (s.includes('-')) { var p = s.split('-'); if (p.length===2) return [parseKrPrice(p[0]), parseKrPrice(p[1])]; }
            var v = parseKrPrice(s); return [v, v];
        }
        function fmtP(v) { return v >= 10000 ? (v/10000).toFixed(1)+'만' : v.toLocaleString(); }

        // Draw plan lines (entry/target/stop)
        if (entryPlan) {
            var lines = [];
            // Entry price range
            var ep = parsePriceRange(entryPlan.entry_price);
            if (ep[0]) lines.push({price:ep[0], color:'#fdcb6e', label:'진입'});
            if (ep[1] && ep[1]!==ep[0]) lines.push({price:ep[1], color:'#fdcb6e', label:'진입'});
            // Shade entry range
            if (ep[0] && ep[1] && ep[0]!==ep[1]) {
                ctx.save(); ctx.fillStyle='rgba(253,203,110,0.06)';
                ctx.fillRect(pad.left, y(Math.max(ep[0],ep[1])), W-pad.left-pad.right, Math.abs(y(ep[0])-y(ep[1])));
                ctx.restore();
            }
            // Target price
            var tp = parseKrPrice(entryPlan.target_price);
            if (tp) lines.push({price:tp, color:'#00b894', label:'목표'});
            // Stop loss
            var sl = parseKrPrice(entryPlan.stop_loss);
            if (sl) lines.push({price:sl, color:'#e17055', label:'손절'});

            lines.forEach(function(ln) {
                if (ln.price < minP || ln.price > maxP) return; // skip if out of visible range
                ctx.save();
                ctx.setLineDash([5, 4]);
                ctx.strokeStyle = ln.color;
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.7;
                ctx.beginPath(); ctx.moveTo(pad.left, y(ln.price)); ctx.lineTo(W-pad.right, y(ln.price)); ctx.stroke();
                ctx.setLineDash([]);
                ctx.globalAlpha = 1;
                ctx.fillStyle = ln.color;
                ctx.font = '8px monospace';
                ctx.textAlign = 'right';
                ctx.fillText(ln.label + ' ' + fmtP(ln.price), W-pad.right-2, y(ln.price)-3);
                ctx.restore();
            });
        }

        // Date labels
        ctx.fillStyle = '#555';
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'center';
        [0, Math.floor(data.length/2), data.length-1].forEach(i => {
            if (data[i]) {
                const dt = data[i].date;
                const label = dt.substring(4,6) + '/' + dt.substring(6,8);
                ctx.fillText(label, pad.left + i * cw + cw/2, H - 5);
            }
        });
    }

                h += '<div class="chart-container"><img class="chart-img" src="' + chartImages[chartId] + '" /></div>';
            }

            if (item.summary) h += '<div class="summary-text">' + esc(item.summary) + '</div>';

            if (item.reasons && item.reasons.length) {
                h += '<div class="reasons-title">📋 선정 근거</div>';
                item.reasons.forEach(r => { h += '<div class="reason-item">' + esc(r) + '</div>'; });
            }

            if (plan.entry_price || plan.target_price) {
                h += '<div class="plan-grid">';
                h += '<div class="plan-item"><div class="plan-label">진입가</div><div class="plan-value">' + esc(plan.entry_price || '-') + '</div></div>';
                h += '<div class="plan-item"><div class="plan-label">목표가</div><div class="plan-value">' + esc(plan.target_price || '-') + '</div></div>';
                h += '<div class="plan-item"><div class="plan-label">손절가</div><div class="plan-value">' + esc(plan.stop_loss || '-') + '</div></div>';
                h += '<div class="plan-item"><div class="plan-label">예상 수익</div><div class="plan-value">' + esc(plan.expected_return || '-') + '</div></div>';
                h += '<div class="plan-item"><div class="plan-label">손익비</div><div class="plan-value">' + esc(plan.risk_reward || '-') + '</div></div>';
                h += '<div class="plan-item"><div class="plan-label">보유 기간</div><div class="plan-value">' + esc(plan.holding_period || '-') + '</div></div>';
                h += '</div>';
            }

            if (item.risks && item.risks.length) {
                h += '<div class="sub-title">⚠️ 리스크</div>';
                item.risks.forEach(r => {
                    const sev = (r.severity || 'medium').toLowerCase();
                    h += '<div class="risk-item"><span class="risk-sev sev-' + sev + '">' + sev.toUpperCase() + '</span><div><div class="risk-text">' + esc(r.factor) + '</div>';
                    if (r.mitigation) h += '<div class="risk-miti">→ ' + esc(r.mitigation) + '</div>';
                    h += '</div></div>';
                });
            }

            if (item.catalysts && item.catalysts.length) {
                h += '<div class="sub-title">🚀 향후 촉매제</div>';
                item.catalysts.forEach(c => {
                    const text = typeof c === 'string' ? c : (c.event || c.catalyst || JSON.stringify(c));
                    h += '<div class="catalyst-item">' + esc(text) + '</div>';
                });
            }

            if (item.verdict) h += '<div class="verdict-box">💡 ' + esc(item.verdict) + '</div>';
            h += '</div>';
        });
        h += '</div>';

        if (caution) h += '<div class="section"><div class="section-title">⚠️ 주의사항</div><div class="extra-content">' + esc(caution) + '</div></div>';
        if (newsFlow.summary) h += '<div class="section"><div class="section-title">📰 뉴스 흐름</div><div class="extra-content">' + esc(newsFlow.summary) + '</div></div>';

        h += '<div class="footer"><p>⚠️ 본 분석은 AI 기반 참고 자료이며, 투자 결정은 본인의 판단에 따라 이루어져야 합니다.</p></div>';
        h += '</div></body></html>';

        const blob = new Blob([h], { type: 'text/html;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'STGAY_리포트_' + ts.replace(/[^0-9]/g, '') + '.html';
        a.click();
        URL.revokeObjectURL(a.href);
    }

    // 페이지 로드 시 기존 결과 확인
    fetch('/stgay/api/status').then(r => r.json()).then(data => {
        if (data.running) {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = '분석 진행 중...';
            document.getElementById('progressSection').style.display = 'block';
            pollTimer = setInterval(pollStatus, 1500);
        } else if (data.has_result) {
            fetch('/stgay/api/result').then(r => r.json()).then(renderDashboard);
        }
    }).catch(() => {});
    
    function toggleCalc(id) {
        var el = document.getElementById(id);
        el.classList.toggle('open');
    }

    function applyRange(calcId) {
        var rminEl = document.getElementById(calcId + '-rmin');
        var rmaxEl = document.getElementById(calcId + '-rmax');
        if (!rminEl || !rmaxEl) return;
        var entryEl = document.getElementById(calcId + '-entry');
        entryEl.value = rmaxEl.value;
        entryEl.dataset.rangeMode = '1';
        entryEl.dataset.rmin = rminEl.value;
        entryEl.dataset.rmax = rmaxEl.value;
        var btns = document.querySelectorAll('.calc-range-btn');
        btns.forEach(function(b){ b.innerHTML = '\u2705 \xeb\xb2\x94\xec\x9c\x84 \xec\xa0\x81\xec\x9a\xa9\xeb\x90\xa8'; b.classList.add('applied'); });
    }

    function runCalc(id) {
        var lowEl = document.getElementById(id + '-low');
        var highEl = document.getElementById(id + '-high');
        var rMin = lowEl ? parseFloat(lowEl.value) : NaN;
        var rMax = highEl ? parseFloat(highEl.value) : NaN;
        if (isNaN(rMin) && !isNaN(rMax)) rMin = rMax;
        if (isNaN(rMax) && !isNaN(rMin)) rMax = rMin;
        if (rMin > rMax) { var _t = rMin; rMin = rMax; rMax = _t; }
        var entry = !isNaN(rMin) ? rMin : NaN;
        var rangeMode = !isNaN(rMin) && !isNaN(rMax) && rMin !== rMax;
        var budget = parseFloat(document.getElementById(id + '-budget').value);
        var split = parseInt(document.getElementById(id + '-split').value) || 1;
        var mode = document.getElementById(id + '-mode').value;
        var resultDiv = document.getElementById(id + '-result');
        if (!entry || entry <= 0) { resultDiv.innerHTML = '<p style="color:var(--red)">진입가를 입력하세요</p>'; return; }
        if (!budget || budget <= 0) { resultDiv.innerHTML = '<p style="color:var(--red)">투자금액을 입력하세요</p>'; return; }
        if (split < 1) split = 1;
        var weights = [];
        for (var i = 0; i < split; i++) {
            if (mode === 'pyramid_up') weights.push(i + 1);
            else if (mode === 'pyramid_down') weights.push(split - i);
            else weights.push(1);
        }
        var totalWeight = weights.reduce(function(a,b){return a+b;},0);
        var h = '<table class="calc-result-table"><tr><th>단계</th><th>매수가</th><th>비중</th><th>수량</th><th>금액</th></tr>';
        var totalQty = 0, totalAmount = 0;
        var stepPrices = [];
        if (rangeMode && rMin && rMax && split > 1) {
            for (var s = 0; s < split; s++) stepPrices.push(Math.round(rMin + (rMax - rMin) * (s / (split - 1))));
        } else {
            for (var s = 0; s < split; s++) stepPrices.push(entry);
        }
        for (var i = 0; i < split; i++) {
            var sp = stepPrices[i];
            var pct = Math.round(weights[i] / totalWeight * 100);
            var alloc = Math.floor(budget * weights[i] / totalWeight);
            var qty = Math.floor(alloc / sp);
            var used = qty * sp;
            totalQty += qty; totalAmount += used;
            h += '<tr><td>'+(i+1)+'차</td><td>'+sp.toLocaleString()+'원</td><td>'+pct+'%</td><td>'+qty+'주</td><td>'+used.toLocaleString()+'원</td></tr>';
        }
        h += '</table>';
        h += '<div class="calc-summary">';
        h += '<div class="sum-item"><div class="sum-label">총 매수수량</div><div class="sum-value">'+totalQty.toLocaleString()+'주</div></div>';
        h += '<div class="sum-item"><div class="sum-label">총 매수금액</div><div class="sum-value">'+totalAmount.toLocaleString()+'원</div></div>';
        h += '<div class="sum-item"><div class="sum-label">평균단가</div><div class="sum-value">'+(totalQty>0?Math.round(totalAmount/totalQty):0).toLocaleString()+'원</div></div>';
        h += '<div class="sum-item"><div class="sum-label">잔여금액</div><div class="sum-value">'+(budget-totalAmount).toLocaleString()+'원</div></div>';
        h += '</div>';
        resultDiv.innerHTML = h;
    }

</script>
