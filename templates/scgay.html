<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scgay — 급등 대장주</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Pretendard', sans-serif;
    background: radial-gradient(ellipse at top, #1a0033 0%, #000 70%);
    color: #e2e8f0; min-height: 100vh; padding: 24px; position: relative; overflow-x: hidden;
  }
  /* 배경 떠다니는 캔들 */
  body::before, body::after {
    content: '🕯️'; position: fixed; font-size: 60px; opacity: 0.06; pointer-events: none;
    animation: float 12s ease-in-out infinite;
  }
  body::before { top: 10%; left: 3%; }
  body::after  { top: 60%; right: 4%; animation-delay: 6s; }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-8deg); }
    50%     { transform: translateY(-40px) rotate(8deg); }
  }
  .wrap { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,0,255,0.15);
  }
  .logo {
    font-size: 28px; font-weight: 900; letter-spacing: 4px; color: #fff;
    text-shadow: 0 0 8px #ff00ff, 0 0 16px #ff00ff, 0 0 32px #ff1493;
    animation: flicker 4s infinite alternate;
  }
  .logo::after {
    content: ' · SIX CANDLE SYSTEM';
    font-size: 11px; letter-spacing: 4px; color: #00ffff;
    text-shadow: 0 0 6px #00ffff; font-weight: 600; margin-left: 8px;
  }
  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96%,98% { opacity: 0.6; }
    97% { opacity: 0.3; }
  }
  .logout {
    color: #ff69b4; text-decoration: none; font-size: 13px;
    padding: 8px 16px; border-radius: 999px;
    background: rgba(255,0,255,0.08); border: 1px solid rgba(255,0,255,0.2);
    transition: all 0.2s;
  }
  .logout:hover { color: #fff; background: rgba(255,0,255,0.2); box-shadow: 0 0 12px rgba(255,0,255,0.5); }
  .grid { display: grid; gap: 20px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: rgba(20,0,40,0.5); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,0,255,0.2); border-radius: 20px;
    padding: 24px;
    box-shadow: 0 0 24px rgba(255,0,255,0.08), inset 0 0 20px rgba(255,0,255,0.03);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card:hover { border-color: rgba(0,255,255,0.3); box-shadow: 0 0 32px rgba(0,255,255,0.12); }
  .card.full { grid-column: 1 / -1; }
  h2 { font-size: 17px; font-weight: 800; margin-bottom: 16px; color: #fff;
       display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
       text-shadow: 0 0 8px rgba(255,0,255,0.4); }
  .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 999px;
    background: rgba(255,0,255,0.15); color: #ff69b4; font-weight: 700;
    border: 1px solid rgba(255,0,255,0.3); letter-spacing: 1px;
  }
  button.primary {
    padding: 12px 28px; border-radius: 999px; border: none;
    background: linear-gradient(135deg, #ff00ff, #ff1493, #00ffff);
    background-size: 200% 200%; color: white;
    font-weight: 800; cursor: pointer; font-size: 14px; letter-spacing: 1px;
    animation: gradient-shift 3s ease infinite;
    box-shadow: 0 0 16px rgba(255,0,255,0.5);
    transition: transform 0.15s;
  }
  @keyframes gradient-shift {
    0%,100% { background-position: 0% 50%; }
    50%     { background-position: 100% 50%; }
  }
  button.primary:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 0 24px rgba(255,0,255,0.7); }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; animation: none; }
  button.ghost {
    padding: 10px 18px; border-radius: 999px;
    background: rgba(0,255,255,0.06); color: #00ffff;
    border: 1px solid rgba(0,255,255,0.3); cursor: pointer; font-weight: 600;
    transition: all 0.2s;
  }
  button.ghost:hover { background: rgba(0,255,255,0.15); box-shadow: 0 0 12px rgba(0,255,255,0.4); }
  input.txt {
    padding: 12px 16px; border-radius: 12px;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,0,255,0.3);
    color: #fff; font-size: 15px; width: 180px; letter-spacing: 2px; text-align: center;
  }
  input.txt:focus { outline: none; border-color: #00ffff; box-shadow: 0 0 12px rgba(0,255,255,0.5); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .progress { margin-top: 14px; font-size: 13px; color: #ff69b4; }
  .bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 99px; overflow: hidden; margin-top: 8px;
         border: 1px solid rgba(255,0,255,0.15); }
  .bar > div { height: 100%; background: linear-gradient(90deg, #ff00ff, #00ffff); transition: width 0.3s;
               box-shadow: 0 0 8px rgba(255,0,255,0.6); }
  .leader-card {
    padding: 16px; border-radius: 14px; background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,0,255,0.15); margin-top: 12px;
    transition: border-color 0.3s;
  }
  .leader-card:hover { border-color: rgba(0,255,255,0.4); }
  .leader-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .leader-name { font-weight: 800; font-size: 16px; color: #fff; }
  .leader-code { color: #94a3b8; font-size: 12px; margin-left: 6px; }
  .pct-up { color: #ff1493; font-weight: 800; text-shadow: 0 0 6px rgba(255,20,147,0.5); }
  .theme-tag {
    display: inline-block; font-size: 11px; padding: 4px 12px; border-radius: 999px;
    background: rgba(0,255,255,0.1); color: #00ffff; margin-bottom: 8px;
    border: 1px solid rgba(0,255,255,0.2); letter-spacing: 1px;
  }
  .scalp { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; font-size: 12px; }
  .scalp > div { background: rgba(255,0,255,0.05); padding: 10px; border-radius: 8px; text-align: center;
                 border: 1px solid rgba(255,0,255,0.1); }
  .scalp .lbl { color: #ff69b4; font-size: 10px; margin-bottom: 4px; letter-spacing: 1px; }
  .scalp .val { font-weight: 800; color: #fff; font-size: 13px; }
  .vwap-result {
    margin-top: 16px; padding: 16px;
    background: rgba(0,0,0,0.5); border-radius: 12px; display: none;
    border: 1px solid rgba(0,255,255,0.2);
  }
  .vwap-result.active { display: block; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid rgba(255,0,255,0.08); }
  th { color: #ff69b4; font-weight: 700; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  tbody tr:hover { background: rgba(255,0,255,0.04); }
  .empty { color: #64748b; padding: 24px; text-align: center; font-size: 13px; font-style: italic; }
  .warning { font-size: 12px; color: #fbbf24; margin-top: 8px; }
  .basis-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    background: rgba(0,255,255,0.15); color: #00ffff;
    border: 1px solid rgba(0,255,255,0.3);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">SCS</div>
    <a class="logout" href="/scgay/logout">로그아웃</a>
  </header>

  <div class="grid">
    <!-- 1) 분석 섹션 -->
    <div class="card full">
      <h2>🍆 육봉 크로스체킹 가동 <span class="badge">+15% 솟음</span></h2>
      <div class="row">
        <button class="primary" id="btn-scan">분석 시작</button>
        <span class="progress" id="status">대기 중</span>
      </div>
      <div class="bar"><div id="bar" style="width:0%"></div></div>
      <div id="leaders"></div>
    </div>

    <!-- 2) VWAP 조회 -->
    <div class="card">
      <h2>🍆 단일 종목 육봉 체크</h2>
      <div class="row">
        <input class="txt" id="vwap-code" maxlength="6" placeholder="종목코드 (006340)">
        <button class="primary" id="btn-vwap">조회</button>
      </div>
      <div class="vwap-result" id="vwap-out"></div>
    </div>

    <!-- 3) 아카이브 -->
    <div class="card">
      <h2>📁 분석 아카이브 <span class="badge" id="arc-count">0건</span></h2>
      <div id="archive"><div class="empty">불러오는 중...</div></div>
    </div>
  </div>
</div>

<script>
const fmt = (n) => n == null ? '-' : Number(n).toLocaleString('ko-KR');

// === 분석 ===
let pollTimer = null;
async function startScan() {
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  document.getElementById('status').textContent = '시작 중...';
  try {
    const r = await fetch('/scgay/api/scan', { method: 'POST' });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '실패');
    pollStatus();
  } catch (e) {
    alert('실패: ' + e.message);
    btn.disabled = false;
  }
}
function pollStatus() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const r = await fetch('/scgay/api/status');
    const d = await r.json();
    document.getElementById('status').textContent = `${d.phase || ''} · ${d.progress || ''}`;
    document.getElementById('bar').style.width = (d.percent || 0) + '%';
    if (!d.running) {
      clearInterval(pollTimer);
      document.getElementById('btn-scan').disabled = false;
      if (d.has_result) loadResult();
    }
  }, 2000);
}
async function loadResult() {
  const r = await fetch('/scgay/api/result');
  if (!r.ok) return;
  const d = await r.json();
  renderLeaders(d);
  loadArchive();
}
function renderLeaders(d) {
  const el = document.getElementById('leaders');
  const surge = (d || {}).surge_leaders || {};
  const leaders = surge.leaders || [];
  if (!leaders.length) {
    el.innerHTML = '<div class="empty">대장주 없음 (조건 미충족)</div>';
    return;
  }
  el.innerHTML = leaders.map(item => {
    const L = item.leader || {};
    const s = item.scalping || {};
    return `
      <div class="leader-card">
        <span class="theme-tag">${item.theme_name || '-'} · ${item.theme_members_count || 0}종목</span>
        <div class="leader-head">
          <div>
            <span class="leader-name">${L.name || '-'}</span>
            <span class="leader-code">${L.code || ''}</span>
          </div>
          <div class="pct-up">+${(L.cum_return_pct || 0).toFixed(1)}%</div>
        </div>
        <div style="font-size:13px;color:#94a3b8">현재가 <b style="color:#f1f5f9">${fmt(s.current_price || L.price)}</b>원
          · 시총 ${fmt(L.market_cap_eok)}억 · 거래량 x${(L.volume_ratio || 0).toFixed(1)}</div>
        <div class="scalp">
          <div><div class="lbl">진입↓</div><div class="val">${fmt(s.entry_low)}</div></div>
          <div><div class="lbl">진입↑</div><div class="val">${fmt(s.entry_high)}</div></div>
          <div><div class="lbl">목표1</div><div class="val">${fmt(s.target1)}</div></div>
          <div><div class="lbl">손절</div><div class="val" style="color:#fb7185">${fmt(s.stop)}</div></div>
          <div><div class="lbl">RR</div><div class="val">${s.rr_ratio || '-'}</div></div>
        </div>
        ${s.basis ? `<div style="margin-top:8px"><span class="basis-badge">${s.basis}</span></div>` : ''}
        ${item.warning ? `<div class="warning">⚠️ ${item.warning}</div>` : ''}
      </div>`;
  }).join('');
}

// === VWAP ===
async function checkVwap() {
  const code = document.getElementById('vwap-code').value.trim();
  const out = document.getElementById('vwap-out');
  out.classList.add('active');
  out.innerHTML = '<div style="color:#94a3b8;font-size:13px">조회 중...</div>';
  try {
    const r = await fetch('/scgay/api/vwap?code=' + encodeURIComponent(code));
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '실패');
    out.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div><b style="font-size:18px">${d.name || d.code}</b> <span style="color:#94a3b8;font-size:12px;margin-left:6px">${d.code}</span><div style="color:#64748b;font-size:11px;margin-top:2px">${d.updated_at}</div></div>
        <div class="pct-up" style="font-size:18px">${fmt(d.current_price)}원</div>
      </div>
      <div class="scalp">
        <div><div class="lbl">VWAP</div><div class="val">${fmt(d.vwap)}</div></div>
        <div><div class="lbl">진입↓</div><div class="val">${fmt(d.entry_low)}</div></div>
        <div><div class="lbl">진입↑</div><div class="val">${fmt(d.entry_high)}</div></div>
        <div><div class="lbl">목표1</div><div class="val">${fmt(d.target1)}</div></div>
        <div><div class="lbl">손절</div><div class="val" style="color:#fb7185">${fmt(d.stop)}</div></div>
      </div>
      <div style="margin-top:12px;padding:10px;background:rgba(255,255,255,0.04);border-radius:8px;display:flex;gap:14px;flex-wrap:wrap;font-size:13px">
        <div>📊 거래량 <b>${d.volume_signal || '-'}</b> <span style="color:#94a3b8">(${d.volume_ratio || '-'}x)</span></div>
        <div>📍 위치 <b>${d.vwap_position || '-'}</b></div>
        <div>📏 이격 <b style="color:${Math.abs(d.disparity_pct||0) > 2 ? '#fb923c' : '#34d399'}">${(d.disparity_pct >= 0 ? '+' : '') + (d.disparity_pct || 0)}%</b></div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:#94a3b8">RR ${d.rr_ratio} · 1분봉 ${d.candle_count}개 · ${d.basis}</div>`;
  } catch (e) {
    out.innerHTML = `<div style="color:#fb7185;font-size:13px">❌ ${e.message}</div>`;
  }
}

// === 아카이브 ===
async function loadArchive() {
  const r = await fetch('/scgay/api/archive');
  const d = await r.json();
  document.getElementById('arc-count').textContent = (d.total || 0) + '건';
  const el = document.getElementById('archive');
  if (!d.items || !d.items.length) {
    el.innerHTML = '<div class="empty">아직 아카이빙된 추천이 없어요</div>';
    return;
  }
  el.innerHTML = `<table>
    <thead><tr><th>날짜</th><th>종목</th><th>테마</th><th>진입↑</th><th>손절</th><th>RR</th></tr></thead>
    <tbody>${d.items.map(it => `
      <tr>
        <td style="color:#94a3b8;font-size:11px">${(it.date || '').slice(5)}</td>
        <td><b>${it.name}</b><br><span style="color:#64748b;font-size:10px">${it.code}</span></td>
        <td style="font-size:11px;color:#fbbf24">${it.theme_name || '-'}</td>
        <td>${fmt(it.entry_high)}</td>
        <td style="color:#fb7185">${fmt(it.stop)}</td>
        <td>${it.rr_ratio || '-'}</td>
      </tr>`).join('')}</tbody></table>`;
}

document.getElementById('btn-scan').onclick = startScan;
const _btnR = document.getElementById('btn-result'); if(_btnR) _btnR.onclick = loadResult;
document.getElementById('btn-vwap').onclick = checkVwap;
document.getElementById('vwap-code').addEventListener('keydown', e => { if (e.key === 'Enter') checkVwap(); });

// 초기 로드
loadArchive();
fetch('/scgay/api/status').then(r => r.json()).then(d => {
  if (d.has_result) loadResult();
  if (d.running) pollStatus();
});
</script>
</body>
</html>
